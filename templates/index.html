<!DOCTYPE html>
<html>
<head>
    <title>Renovação NFE Reader</title>
</head>
<body>

    <h2>Renovar Licença</h2>

    <label>CNPJ:</label><br>
    <input type="text" id="cnpj"><br><br>

    <label>HWID:</label><br>
    <input type="text" id="hwid"><br><br>

    <label>Plano:</label><br>
    <select id="plano" onchange="atualizarValor()">
        <option value="mensal">30 dias (Mensal)</option>
        <option value="trimestral">90 dias (Melhor custo)</option>
        <option value="anual">365 dias (Mais econômico)</option>
        <option value="vitalicio">Vitalício</option>
    </select><br><br>

    <p><strong>Valor:</strong> R$ <span id="valor">0,00</span></p>

    <button onclick="gerarPix()">💰 Gerar PIX</button>

    <div id="pix"></div>

    <h2 id="resultado"></h2>

<script>

// Valores
const valores = {
    mensal: 29.90,
    trimestral: 79.90,
    anual: 199.90,
    vitalicio: 499.90
};

let payment_id = null;

// Atualiza valor
function atualizarValor() {
    const plano = document.getElementById("plano").value;
    const valor = valores[plano];

    document.getElementById("valor").innerText =
        valor.toFixed(2).replace('.', ',');
}

// GERAR PIX (CORRIGIDO)
function gerarPix() {
    const cnpj = document.getElementById("cnpj").value;
    const hwid = document.getElementById("hwid").value;
    const plano = document.getElementById("plano").value;

    fetch("/criar-pagamento", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ cnpj, hwid, plano })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        payment_id = data.payment_id;

        document.getElementById("pix").innerHTML = `
            <p><strong>Valor:</strong> R$ ${data.valor}</p>
            <p><strong>PIX Copia e Cola:</strong></p>
            <textarea rows="4" cols="50">${data.pix_copia_cola}</textarea>
        `;
    })
    .catch(err => {
        console.error(err);
        alert("Erro ao gerar PIX");
    });
}

// init
atualizarValor();

</script>

</body>
</html>
